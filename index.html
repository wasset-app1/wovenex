<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wovenex</title>
  <meta name="description" content="Official website of Wovenex." />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 760px;
      padding: 40px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }
    p {
      line-height: 1.7;
      color: #cbd5e1;
      font-size: 18px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }
    .meta {
      margin-top: 22px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wovenex</h1>
    <p>Official website of Wovenex. We build digital products and online solutions.</p>
    <a class="btn" href="mailto:contact@wovenex.online">contact@wovenex.online</a>
    <div class="meta">Official domain: wovenex.online</div>
  </div>
</body>
</html>
